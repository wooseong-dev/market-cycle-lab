<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title or settings.site_name }}</title>
  <meta name="description" content="{{ page_description or settings.site_description }}">

  {% if settings.google_site_verification %}
  <meta name="google-site-verification" content="{{ settings.google_site_verification }}">
  {% endif %}

  {% if settings.naver_site_verification %}
  <meta name="naver-site-verification" content="{{ settings.naver_site_verification }}">
  {% endif %}

  <link rel="canonical" href="{{ settings.site_url.rstrip('/') }}{{ request.url.path }}">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/">
          <span class="brand-dot"></span>
          <span>시장 사이클 연구소</span>
        </a>

        <nav class="top-nav">
          <a href="/">대시보드</a>
          <a href="/simulations">시뮬레이션</a>
          <a href="/framework">투자 프레임워크</a>
          <a href="/evidence">근거 허브</a>
          <a href="/rankings/stress">스트레스 랭킹</a>
          <a href="/tools/last-year">작년 오늘</a>
          <a href="/analysis">분석 노트</a>
          <a href="/asset/BTC-USD">비트코인</a>
        </nav>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div>
          <strong>{{ settings.site_name }}</strong>
          <p>가격 예측이 아니라 시장 위치와 버티기 난이도, 근거 데이터를 관찰하는 실험실입니다.</p>
        </div>
        <div>
          <a href="/sitemap.xml">Sitemap</a>
          <a href="/robots.txt">Robots</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
